<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Booking Portal</title>
    <!-- Tell the phone this is an installable app -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script>
      // Register the background service worker script
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Header -->
    <header class="main-header">
        <h1>Premium Dispatch Services</h1>
        <div class="client-badge">Client Portal</div>
    </header>

    <div class="dashboard-container max-width-small">
        
        <!-- Booking Form Card -->
        <section class="card-section">
            <h2>Request a Professional Worker</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px;">
                Please select an available worker and provide your assignment details. Your request will be evaluated by HQ instantly.
            </p>

            <form id="bookingForm" onsubmit="submitRequest(event)">
                <div class="form-group">
                    <label for="clientName">Your Name / Company</label>
                    <input type="text" id="clientName" required placeholder="e.g., John Doe">
                </div>

                <div class="form-group">
                    <label for="workerSelect">Select Available Worker</label>
                    <select id="workerSelect" required>
                        <option value="" disabled selected>-- Choose an operative --</option>
                        <option value="Worker 1">Worker 1 (Available)</option>
                        <option value="Worker 2">Worker 2 (Available)</option>
                        <option value="Worker 4">Worker 4 (Available)</option>
                        <option value="Worker 5">Worker 5 (Available)</option>
                        <option value="Worker 6">Worker 6 (Available)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="locationInput">Deployment Location</label>
                    <input type="text" id="locationInput" required placeholder="e.g., Sector 4, Plaza Suite B">
                </div>

                <button type="submit" class="btn btn-approve" style="width: 100%; padding: 12px; margin-top: 10px; font-size: 1rem;">
                    Submit Hire Request
                </button>
            </form>
        </section>

        <!-- Live Status Tracking Area -->
        <div id="trackingStatus" class="tracking-card" style="display: none;">
            <h3>📋 Live Request Tracking</h3>
            <div class="status-timeline">
                <div class="timeline-step done">✓ Request Sent</div>
                <div id="leaderStep" class="timeline-step pending">⏳ Awaiting Leader Approval...</div>
            </div>
        </div>

        <!-- Chat Window UI (Hidden until approved) -->
        <div id="chatSection" class="card-section" style="display: none; margin-top: 20px;">
            <h3>💬 Live Chat with Operative</h3>
            <div id="chatBox" style="height: 200px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155;">
                <!-- Messages appear here -->
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chatMessage" placeholder="Type a message..." style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white;">
                <button onclick="sendChatMessage('Client')" class="btn btn-approve" style="padding: 10px 20px;">Send</button>
            </div>
        </div>

    </div>

    <!-- Include Firebase SDK Apps and Realtime Database modules -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDpStX4DPOjGItmM1_euYkBkHHBOyjNhlU",
        authDomain: "vanguard-prime.firebaseapp.com",
        databaseURL: "https://vanguard-prime-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "vanguard-prime",
        storageBucket: "vanguard-prime.firebasestorage.app",
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function submitRequest(event) {
        event.preventDefault();
        
        const name = document.getElementById('clientName').value;
        const worker = document.getElementById('workerSelect').value;
        const location = document.getElementById('locationInput').value;

        const requestRef = database.ref('requests');
        const newRequestRef = requestRef.push();
        
        newRequestRef.set({
            client: name,
            worker: worker,
            location: location,
            status: 'pending',
            timestamp: Date.now()
        });

        document.getElementById('bookingForm').reset();
        document.getElementById('trackingStatus').style.display = 'block';

        newRequestRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const leaderStep = document.getElementById('leaderStep');
            if (data.status === 'approved') {
                leaderStep.className = "timeline-step approved";
                leaderStep.innerText = `✅ Approved! ${data.worker} is dispatched to your location.`;
                
                // ⚡ FIX: Turn on the chat view automatically once approved!
                enableChat(snapshot.key);
            } else if (data.status === 'declined') {
                leaderStep.className = "timeline-step declined";
                leaderStep.innerText = `❌ Declined: Operative is unavailable.`;
                document.getElementById('chatSection').style.display = 'none';
            } else if (data.status === 'completed') {
                document.getElementById('chatSection').style.display = 'none';
            }
        });
    }

    let activeJobId = null;
    let chatListenerRef = null;

    function enableChat(requestId) {
        if (activeJobId === requestId) return;
        activeJobId = requestId;
        
        document.getElementById('chatSection').style.display = 'block';
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = ""; 

        if (chatListenerRef) chatListenerRef.off();

        chatListenerRef = database.ref(`chats/${activeJobId}`);
        chatListenerRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            chatBox.innerHTML += `<p style="margin: 5px 0; color: ${msg.sender === 'Client' ? '#3b82f6' : '#10b981'}"><strong>${msg.sender}:</strong> ${msg.text}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function sendChatMessage(senderName) {
        const msgInput = document.getElementById('chatMessage');
        const text = msgInput.value.trim();
        if (!text || !activeJobId) return;

        database.ref(`chats/${activeJobId}`).push({
            sender: senderName,
            text: text,
            timestamp: Date.now()
        });
        msgInput.value = "";
    }
</script>
</body>
</html>
