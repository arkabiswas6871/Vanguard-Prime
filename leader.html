<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Command Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Header -->
    <header class="main-header">
        <h1>HQ Command Center</h1>
        <div class="leader-badge">Role: Leader</div>
    </header>

    <div class="dashboard-container">
        
        <!-- Section 1: Worker Status Grid -->
        <section class="card-section">
            <h2>Worker Force Status</h2>
            <div class="worker-grid" id="statusGrid">
                <!-- Dynamically generated by JavaScript -->
            </div>
        </section>

        <!-- Lower Layout Split Columns -->
        <div class="action-grid">
            
            <!-- Incoming Requests -->
            <section class="card-section">
                <h2>Pending Hire Requests</h2>
                <div class="request-list" id="pendingList">
                    <!-- Dynamic Requests go here -->
                </div>
            </section>

            <!-- Active Deployments & Guard Emergency Controls -->
            <section class="card-section">
                <h2>Active Operations & Security</h2>
                <div class="active-list" id="activeList">
                    <!-- Dynamic Active Deployments go here -->
                </div>
            </section>
        </div>

        <!-- 💬 HQ Comms Intel Monitor -->
        <section class="card-section" id="leaderChatSection" style="margin-top:20px; display:none;">
            <h2 id="chatMonitorTitle">📡 Operational Comms Intel Link</h2>
            <div id="leaderChatBox" style="height: 220px; overflow-y: auto; background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155;">
                <!-- Monitored client/worker text flow goes here -->
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="leaderChatMessage" placeholder="Broadcast directive order to channel..." style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white;">
                <button id="leaderSendBtn" class="btn btn-approve" style="padding: 10px 20px; background:#6366f1;">HQ Broadcast</button>
            </div>
        </section>

    </div>

    <!-- Firebase System Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpStX4DPOjGItmM1_euYkBkHHBOyjNhlU",
            authDomain: "vanguard-prime.firebaseapp.com",
            databaseURL: "https://vanguard-prime-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vanguard-prime",
            storageBucket: "vanguard-prime.firebasestorage.app",
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const workersList = ["Worker 1", "Worker 2", "Worker 3", "Worker 4", "Worker 5", "Worker 6"];
        
        let activeMonitorJobId = null;
        let leaderChatRef = null;

        database.ref('requests').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            document.getElementById('pendingList').innerHTML = "";
            document.getElementById('activeList').innerHTML = "";
            
            let busyWorkers = {};
            let monitoredJobStillActive = false;

            for (let id in data) {
                const item = data[id];
                
                if (item.status === 'pending') {
                    const reqItem = document.createElement('div');
                    reqItem.className = 'request-item';
                    reqItem.innerHTML = `
                        <div class="request-details">
                            <strong>Client: ${item.client}</strong>
                            <span>Requesting: ${item.worker}</span>
                            <div class="location">Deploy: ${item.location}</div>
                        </div>
                        <div class="request-actions">
                            <button class="btn btn-approve" onclick="handleDecision('${id}', 'approved')">Approve</button>
                            <button class="btn btn-decline" onclick="handleDecision('${id}', 'declined')">Decline</button>
                        </div>
                    `;
                    document.getElementById('pendingList').appendChild(reqItem);
                } 
                
                else if (item.status === 'approved') {
                    busyWorkers[item.worker] = { client: item.client, location: item.location };
                    if(id === activeMonitorJobId) monitoredJobStillActive = true;

                    const activeItem = document.createElement('div');
                    activeItem.className = 'active-item';
                    activeItem.innerHTML = `
                        <div>
                            <strong>${item.worker}</strong> deployed with <em>${item.client}</em>
                            <div class="location">Location: ${item.location}</div>
                        </div>
                        <div style="margin-top:8px;">
                            <button class="btn btn-approve" style="background:#6366f1; padding:4px 8px; font-size:0.85rem;" onclick="monitorChat('${id}', '${item.worker}')">👁️ Monitor Chat</button>
                            <button class="btn btn-panic" style="padding:4px 8px; font-size:0.85rem;" onclick="alertGuard('${item.worker}', '${item.client}')">⚠️ Alert Guard</button>
                            <button class="btn btn-decline" style="padding:4px 8px; font-size:0.85rem; background:#475569;" onclick="completeJob('${id}')">Finish</button>
                        </div>
                    `;
                    document.getElementById('activeList').appendChild(activeItem);
                }
            }

            if(!monitoredJobStillActive) {
                document.getElementById('leaderChatSection').style.display = "none";
                activeMonitorJobId = null;
                if(leaderChatRef) leaderChatRef.off();
            }

            const gridContainer = document.getElementById('statusGrid');
            gridContainer.innerHTML = "";

            workersList.forEach(workerName => {
                const isBusy = busyWorkers[workerName];
                const card = document.createElement('div');
                
                if (isBusy) {
                    card.className = "worker-card status-busy";
                    card.innerHTML = `
                        <h3>${workerName}</h3>
                        <span class="badge">Busy</span>
                        <p class="client-info">Client: ${isBusy.client}</p>
                    `;
                } else {
                    card.className = "worker-card status-available";
                    card.innerHTML = `
                        <h3>${workerName}</h3>
                        <span class="badge">Available</span>
                        <p class="client-info" style="color:var(--color-available)">Ready for Duty</p>
                    `;
                }
                gridContainer.appendChild(card);
            });
        });

        function monitorChat(requestId, workerName) {
            activeMonitorJobId = requestId;
            document.getElementById('leaderChatSection').style.display = "block";
            document.getElementById('chatMonitorTitle').innerText = `📡 Intel Link: Intercepting ${workerName}`;
            
            const chatBox = document.getElementById('leaderChatBox');
            chatBox.innerHTML = "";

            if(leaderChatRef) leaderChatRef.off();

            leaderChatRef = database.ref(`chats/${activeMonitorJobId}`);
            leaderChatRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                let color = "#3b82f6"; // default client
                if(msg.sender.includes("Worker")) color = "#10b981";
                if(msg.sender === "HQ Leader") color = "#6366f1";

                chatBox.innerHTML += `<p style="margin: 5px 0; color: ${color}"><strong>${msg.sender}:</strong> ${msg.text}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            document.getElementById('leaderSendBtn').onclick = function() {
                const msgInput = document.getElementById('leaderChatMessage');
                const text = msgInput.value.trim();
                if (!text || !activeMonitorJobId) return;

                database.ref(`chats/${activeMonitorJobId}`).push({
                    sender: "HQ Leader",
                    text: text,
                    timestamp: Date.now()
                });
                msgInput.value = "";
            };
        }

        function handleDecision(requestId, decisionStatus) {
            database.ref(`requests/${requestId}`).update({
                status: decisionStatus
            });
        }

        function completeJob(requestId) {
            database.ref(`requests/${requestId}`).update({
                status: 'completed'
            });
        }

        function alertGuard(workerName, clientName) {
            database.ref('securityAlert').set({
                worker: workerName,
                client: clientName,
                active: true,
                timestamp: Date.now()
            });
            alert(`🚨 Critical Update sent to Guard! Target: Protect ${workerName} from Client: ${clientName}.`);
        }
    </script>
</body>
</html>
