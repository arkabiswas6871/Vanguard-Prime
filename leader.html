<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Command Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Header -->
    <header class="main-header">
        <h1>HQ Command Center</h1>
        <div class="leader-badge">Role: Leader</div>
    </header>

    <div class="dashboard-container">
        
        <!-- Section 1: Worker Status Grid -->
        <section class="card-section">
            <h2>Worker Force Status</h2>
            <div class="worker-grid" id="statusGrid">
                <!-- Dynamically generated by JavaScript -->
            </div>
        </section>

        <!-- Lower Layout Split Columns -->
        <div class="action-grid">
            
            <!-- Incoming Requests -->
            <section class="card-section">
                <h2>Pending Hire Requests</h2>
                <div class="request-list" id="pendingList">
                    <!-- Dynamic Requests go here -->
                </div>
            </section>

            <!-- Active Deployments & Guard Emergency Controls -->
            <section class="card-section">
                <h2>Active Operations & Security</h2>
                <div class="active-list" id="activeList">
                    <!-- Dynamic Active Deployments go here -->
                </div>
            </section>

        </div>
    </div>

    <!-- Firebase System Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ⚠️ PASTE YOUR EXACT FIREBASE CONFIG OBJECT HERE
        const firebaseConfig = {
            apiKey: "AIzaSyDpStX4DPOjGItmM1_euYkBkHHBOyjNhlU",
        authDomain: "vanguard-prime.firebaseapp.com",
        databaseURL: "https://vanguard-prime-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "vanguard-prime",
        storageBucket: "vanguard-prime.firebasestorage.app",

        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Core State Array for tracking our 6 workers
        const workersList = ["Worker 1", "Worker 2", "Worker 3", "Worker 4", "Worker 5", "Worker 6"];

        // 2. Listen to the entire 'requests' node to update Grid and Playbooks in real-time
        database.ref('requests').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // Clear out current UI lists to redraw clean updated states
            document.getElementById('pendingList').innerHTML = "";
            document.getElementById('activeList').innerHTML = "";
            
            // Create an object map to see who is currently busy
            let busyWorkers = {};

            // Loop through all data records in cloud database
            for (let id in data) {
                const item = data[id];
                
                if (item.status === 'pending') {
                    // Inject into Pending List UI
                    const reqItem = document.createElement('div');
                    reqItem.className = 'request-item';
                    reqItem.innerHTML = `
                        <div class="request-details">
                            <strong>Client: ${item.client}</strong>
                            <span>Requesting: ${item.worker}</span>
                            <div class="location">Deploy: ${item.location}</div>
                        </div>
                        <div class="request-actions">
                            <button class="btn btn-approve" onclick="handleDecision('${id}', 'approved')">Approve</button>
                            <button class="btn btn-decline" onclick="handleDecision('${id}', 'declined')">Decline</button>
                        </div>
                    `;
                    document.getElementById('pendingList').appendChild(reqItem);
                } 
                
                else if (item.status === 'approved') {
                    // Mark this specific worker as busy with this client
                    busyWorkers[item.worker] = { client: item.client, location: item.location };

                    // Inject into Active Operations Monitor list
                    const activeItem = document.createElement('div');
                    activeItem.className = 'active-item';
                    activeItem.innerHTML = `
                        <div>
                            <strong>${item.worker}</strong> deployed with <em>${item.client}</em>
                            <div class="location">Location: ${item.location}</div>
                        </div>
                        <!-- Pass the dynamic current worker and violent client data straight into the function context -->
                        <button class="btn btn-panic" onclick="alertGuard('${item.worker}', '${item.client}')">⚠️ Alert Guard</button>
                        <button class="btn btn-decline" style="margin-left:8px; background:#475569;" onclick="completeJob('${id}')">Finish</button>
                    `;
                    document.getElementById('activeList').appendChild(activeItem);
                }
            }

            // 3. Redraw the Main 6-Worker Force Grid based on current live states
            const gridContainer = document.getElementById('statusGrid');
            gridContainer.innerHTML = ""; // Clear grid

            workersList.forEach(workerName => {
                const isBusy = busyWorkers[workerName];
                const card = document.createElement('div');
                
                if (isBusy) {
                    card.className = "worker-card status-busy";
                    card.innerHTML = `
                        <h3>${workerName}</h3>
                        <span class="badge">Busy</span>
                        <p class="client-info">Client: ${isBusy.client}</p>
                    `;
                } else {
                    card.className = "worker-card status-available";
                    card.innerHTML = `
                        <h3>${workerName}</h3>
                        <span class="badge">Available</span>
                        <p class="client-info" style="color:var(--color-available)">Ready for Duty</p>
                    `;
                }
                gridContainer.appendChild(card);
            });
        });

        // 4. Update request status flag inside Firebase
        function handleDecision(requestId, decisionStatus) {
            database.ref(`requests/${requestId}`).update({
                status: decisionStatus
            });
        }

        // 5. Complete Job execution logic to set worker back to free/standby
        function completeJob(requestId) {
            database.ref(`requests/${requestId}`).update({
                status: 'completed'
            });
        }

        // 6. Emergency Broadcast system maps client parameters straight to Guard View cloud nodes
        function alertGuard(workerName, clientName) {
            database.ref('securityAlert').set({
                worker: workerName,
                client: clientName,
                active: true,
                timestamp: Date.now()
            });
            alert(`🚨 Critical Update sent to Guard! Target: Protect ${workerName} from Client: ${clientName}.`);
        }
    </script>
</body>
</html>
